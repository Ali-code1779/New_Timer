<style>

:root{
--card-bg:#ffffff;
--card-shadow:rgba(0,0,0,0.07);
--text-primary:#212529;
--border-color:#e9ecef;
--primary-accent:#0d6efd;
}

.dashboard-wrapper{
font-family:'Cairo','Segoe UI',sans-serif;
color:var(--text-primary)
}

/* CARDS */
.cards-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-bottom:20px
}

.card-box{
background:#fff;
border-radius:10px;
padding:10px 6px;
text-align:center;
box-shadow:0 3px 8px var(--card-shadow);
border:1px solid var(--border-color);
font-size:12px;
line-height:1.2
}

.card-number{
font-size:18px;
font-weight:700;
color:#0d6efd
}

.section-title{
font-size:1.3rem;
font-weight:700;
margin:25px 0 15px
}

/* CHARTS */

.charts-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px
}

.chart-box{
background:#fff;
padding:15px;
border-radius:12px;
border:1px solid #e5e7eb;
height:260px
}

.chart-box canvas{
height:200px!important
}

/* HEATMAP */

.heatmap-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px
}

.heatmap-item{
padding:14px;
border-radius:8px;
text-align:center;
color:#fff;
font-weight:700;
font-size:13px
}

/* TABLE */

.table-box{
background:#fff;
border-radius:12px;
overflow:auto;
border:1px solid #e5e7eb;
margin-top:10px
}

.table-box table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:13px;
}

.table-box thead th{
background:#0d6efd;
color:#fff;
padding:10px;
text-align:center;
white-space:nowrap
}

.table-box td{
padding:8px;
border-top:1px solid #eee;
text-align:center;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
font-size:12px
}


/* PROGRESS BAR */

.remaining-bar{
height:4px;
border-radius:3px;
margin-top:3px;
background:#22c55e;
transition:width 1s linear
}

.timer-warning .remaining-bar{
background:#f59e0b
}

.timer-expired .remaining-bar{
background:#dc2626
}

.timer-active{
background:#e6f7ff
}

.timer-warning{
background:#fff3cd
}

.timer-expired{
background:#f8d7da;
color:#b91c1c;
font-weight:700
}

/* ======================
KITCHEN LIVE SCREEN
====================== */

.kitchen-screen{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:25px
}

.kitchen-card{
background:#111;
color:#fff;
padding:18px;
border-radius:12px;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:140px
}

.kitchen-product{
font-size:18px;
font-weight:700;
margin-bottom:4px
}

.kitchen-section{
font-size:13px;
opacity:.8;
margin-bottom:8px
}

.kitchen-time{
font-size:30px;
font-weight:800
}

/* status colors */

.kitchen-running{
background:#065f46
}

.kitchen-warning{
background:#b45309
}

.kitchen-expired{
background:#b91c1c
}

/* progress */

.kitchen-progress{
width:100%;
height:6px;
border-radius:4px;
background:rgba(255,255,255,.2);
margin-top:8px;
overflow:hidden
}

.kitchen-progress-bar{
height:100%;
background:#22c55e;
transition:width 1s linear
}

.kitchen-warning .kitchen-progress-bar{
background:#f59e0b
}

.kitchen-expired .kitchen-progress-bar{
background:#dc2626
}

/* =========================
RESPONSIVE DESIGN
========================= */

/* Tablets */

@media (max-width:1200px){

.cards-grid{
grid-template-columns:repeat(3,1fr)
}

.charts-grid{
grid-template-columns:1fr 1fr
}

}

/* Small Tablets */

@media (max-width:900px){

.cards-grid{
grid-template-columns:repeat(2,1fr)
}

.chart-box{
height:auto
}

.chart-box canvas{
height:180px!important
}

}

/* Mobile */

@media (max-width:600px){

.dashboard-wrapper{
font-size:12px
}

/* cards */

.cards-grid{
grid-template-columns:1fr 1fr;
gap:8px
}

.card-box{
padding:10px;
font-size:11px
}

.card-number{
font-size:16px
}

/* charts */

.charts-grid{
grid-template-columns:1fr;
gap:10px
}

.chart-box{
padding:10px
}

.chart-box canvas{
height:160px!important
}

/* table */

.table-box{
overflow-x:auto
}

.table-box table{
font-size:11px;
min-width:500px
}

/* heatmap */

.heatmap-grid{
grid-template-columns:repeat(2,1fr)
}

/* kitchen screen */

.kitchen-screen{
grid-template-columns:1fr
}

.kitchen-card{
font-size:14px;
padding:15px
}

.kitchen-time{
font-size:24px
}

}

.table-box{
-webkit-overflow-scrolling:touch
}

.chart-box canvas{
max-width:100%;
white-space:nowrap
}
.table-box table{
min-width:520px
}
</style>


<div class="dashboard-wrapper">

<h2 class="section-title">📊 <span data-lang="title">لوحة التقارير</span></h2>

<div class="cards-grid">

<div class="card-box">
📦 <span data-lang="products">المنتجات</span>
<div id="productsCount" class="card-number">0</div>
</div>

<div class="card-box">
⏱ <span data-lang="active">المؤقتات النشطة</span>
<div id="activeTimersCount" class="card-number">0</div>
</div>

<div class="card-box">
⚠️ <span data-lang="soon">قريبة الانتهاء</span>
<div id="expiringSoon" class="card-number">0</div>
</div>

<div class="card-box">
🔥 <span data-lang="expired">المنتهية</span>
<div id="expiredNow" class="card-number">0</div>
</div>

<div class="card-box">
🍳 <span data-lang="load">ضغط المطبخ</span>
<div id="kitchenLoad" class="card-number">0</div>
</div>

<div class="card-box">
🏆 <span data-lang="top">أكثر قسم</span>
<div id="topSection" class="card-number">--</div>
</div>

</div>


<h3 class="section-title">🔥 <span data-lang="heatmap">خريطة الأقسام</span></h3>
<div id="heatmap" class="heatmap-grid"></div>


<div class="charts-grid">

<div class="chart-box">
<h3>📊 <span data-lang="sectionChart">Timers by Section</span></h3>
<canvas id="sectionChart"></canvas>
</div>

<div class="chart-box">
<h3>📈 <span data-lang="dailyChart">Daily Production</span></h3>
<canvas id="dailyChart"></canvas>
</div>

<div class="chart-box">
<h3>📉 <span data-lang="statusChart">Products Status</span></h3>
<canvas id="statusChart"></canvas>
</div>

</div>


<div class="table-box">

<table>
<thead>
<tr>
<th data-lang="branch">Branch</th>
<th data-lang="section">Section</th>
<th data-lang="product">Product</th>
<th data-lang="qty">Qty</th>
<th>Prepared</th>
<th>Expires</th>
<th data-lang="time">Time Left</th>
</tr>
</thead>

<tbody id="reportsTable"></tbody>

</table>

</div>


<h3 class="section-title">🖥 <span data-lang="kitchen">Kitchen Screen</span></h3>
<div id="kitchenScreen" class="kitchen-screen"></div>

</div>


<script>

(function(){

let sectionChart,dailyChart,statusChart
let dashboardTimer=null

/* ===============================
TRANSLATIONS
=============================== */

const translations={
ar:{
title:"لوحة التقارير",
products:"المنتجات",
active:"المؤقتات النشطة",
soon:"قريبة الانتهاء",
expired:"المنتهية",
load:"ضغط المطبخ",
top:"أكثر قسم",
heatmap:"خريطة الأقسام",
section:"القسم",
product:"المنتج",
qty:"الكمية",
time:"الوقت المتبقي",
branch:"الفرع",
kitchen:"شاشة المطبخ",
sectionChart:"المؤقتات حسب القسم",
dailyChart:"الإنتاج اليومي",
statusChart:"حالة المنتجات"
},
en:{
title:"Reports Dashboard",
products:"Products",
active:"Active Timers",
soon:"Expiring Soon",
expired:"Expired",
load:"Kitchen Load",
top:"Top Section",
heatmap:"Section Heatmap",
section:"Section",
product:"Product",
qty:"Qty",
time:"Time Left",
branch:"Branch",
kitchen:"Kitchen Screen",
sectionChart:"Timers by Section",
dailyChart:"Daily Production",
statusChart:"Products Status"
}
}

/* LANGUAGE */

function applyLang(){

const lang=window.APP_LANG || localStorage.getItem("lang") || "ar"

document.querySelectorAll("[data-lang]").forEach(el=>{
const key=el.dataset.lang
if(translations[lang] && translations[lang][key]){
el.textContent=translations[lang][key]
}
})

}

document.addEventListener("appLanguageChanged",applyLang)



/* ===============================
DATA
=============================== */
function getTimers(){

let timers=[]

try{

if(window.DataStore && DataStore.timers && DataStore.timers.length){

timers=[...DataStore.timers]

}else{

timers=JSON.parse(localStorage.getItem("timers")||"[]")

}

timers.forEach(t=>{

const prep=DateEngine.toTimestamp(t.preparedTime)
const exp=DateEngine.toTimestamp(t.expirationTime)

if(prep) t.preparedTime=prep
if(exp) t.expirationTime=exp

})

}catch{}

return timers

}


function getProducts(){

return JSON.parse(localStorage.getItem("products")||"[]")

}

function getBranch(){

return localStorage.getItem("branch") || "--"

}



/* ===============================
TIME FORMAT
=============================== */

function formatRemaining(ms){

const negative=ms<0
let s=Math.abs(Math.floor(ms/1000))

const d=Math.floor(s/86400)
const h=Math.floor((s%86400)/3600)
const m=Math.floor((s%3600)/60)
const sec=s%60

let txt

if(d>0)
txt=`${d}D ${h}:${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`
else
txt=`${h}:${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`

return negative?"-"+txt:txt

}



/* ===============================
METRICS
=============================== */

function updateMetrics(products,timers){

const now=Date.now()

const active=timers.filter(t=>t.expirationTime-now>600000)
const soon=timers.filter(t=>{
let r=t.expirationTime-now
return r<=600000 && r>0
})
const expired=timers.filter(t=>t.expirationTime-now<=0)

/* Top Section */

let sectionCount={}
timers.forEach(t=>{
sectionCount[t.section]=(sectionCount[t.section]||0)+1
})

let top="--"
let max=0

Object.keys(sectionCount).forEach(s=>{
if(sectionCount[s]>max){
max=sectionCount[s]
top=s
}
})

productsCount.textContent=products.length
activeTimersCount.textContent=active.length
expiringSoon.textContent=soon.length
expiredNow.textContent=expired.length
kitchenLoad.textContent=active.length
topSection.textContent=top

}

/* ===============================
HEATMAP
=============================== */

function renderHeatmap(timers){

const map={}
timers.forEach(t=>map[t.section]=(map[t.section]||0)+1)

const box=document.getElementById("heatmap")
box.innerHTML=""

Object.keys(map).forEach(sec=>{

const div=document.createElement("div")
div.className="heatmap-item"
const level=Math.min(map[sec]*30,255)
div.style.background=`rgb(${level},80,80)`
div.textContent=`${sec} (${map[sec]})`
box.appendChild(div)

})

}


/* ===============================
CHARTS
=============================== */

function renderCharts(timers){

let sectionMap={}
let dailyMap={}
let status={active:0,soon:0,expired:0}

const now=Date.now()

timers.forEach(t=>{

sectionMap[t.section]=(sectionMap[t.section]||0)+1

const date=DateEngine.display(t.preparedTime)
dailyMap[date]=(dailyMap[date]||0)+1

let diff=t.expirationTime-now

if(diff<=0) status.expired++
else if(diff<600000) status.soon++
else status.active++

})

/* Section Chart */

if(sectionChart) sectionChart.destroy()

sectionChart=new Chart(document.getElementById("sectionChart"),{
type:"bar",
data:{
labels:Object.keys(sectionMap),
datasets:[{
data:Object.values(sectionMap),
backgroundColor:"#0d6efd"
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}}
}
})


/* Daily Chart */

if(dailyChart) dailyChart.destroy()

dailyChart=new Chart(document.getElementById("dailyChart"),{
type:"line",
data:{
labels:Object.keys(dailyMap),
datasets:[{
data:Object.values(dailyMap),
borderColor:"#0d6efd",
fill:false
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})


/* Status Chart */

if(statusChart) statusChart.destroy()

statusChart=new Chart(document.getElementById("statusChart"),{
type:"doughnut",
data:{
labels:["Active","Soon","Expired"],
datasets:[{
data:[status.active,status.soon,status.expired]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
position:"right",
labels:{
boxWidth:10,
font:{size:11}
}
}
}
}
})

}


/* ===============================
TABLE
=============================== */function buildTable(timers){

const branch=getBranch()
const body=document.getElementById("reportsTable")

body.innerHTML=""

timers.sort((a,b)=>a.expirationTime-b.expirationTime)

const now=Date.now()

timers.slice(0,Math.min(timers.length,50)).forEach((t,i)=>{

const tr=document.createElement("tr")

const remain=t.expirationTime-now

let statusClass="timer-active"

if(remain<=0) statusClass="timer-expired"
else if(remain<=600000) statusClass="timer-warning"

tr.className=statusClass

tr.innerHTML=`

<td>${branch}</td>

<td>${t.section}</td>

<td>${t.product}</td>

<td>${t.quantity}</td>

<td>${DateEngine.display(t.preparedTime)}</td>

<td>${DateEngine.display(t.expirationTime)}</td>

<td>
<div id="remain-${i}">${formatRemaining(remain)}</div>
<div class="remaining-bar" id="bar-${i}"></div>
</td>

`

body.appendChild(tr)

})

}

function updateProgressBars(){

const timers=getTimers()

timers.sort((a,b)=>a.expirationTime-b.expirationTime)

timers.slice(0,Math.min(timers.length,50)).forEach((t,i)=>{

const remain=t.expirationTime-Date.now()

const bar=document.getElementById(`bar-${i}`)
const txt=document.getElementById(`remain-${i}`)

if(!bar || !txt) return

txt.textContent=formatRemaining(remain)

const row=txt.closest("tr")

if(remain<=0)
row.className="timer-expired"
else if(remain<=600000)
row.className="timer-warning"
else
row.className="timer-active"

const total=(t.duration||1)*3600000

const percent=Math.max(0,Math.min(100,(remain/total)*100))

bar.style.width=percent+"%"

})

}


/* ===============================
KITCHEN
=============================== */
function renderKitchen(timers){

const screen=document.getElementById("kitchenScreen")

screen.innerHTML=""

const now=Date.now()

/* ترتيب حسب الأقرب انتهاء */

timers.sort((a,b)=>a.expirationTime-b.expirationTime)

/* عرض أول 12 عنصر */

timers.slice(0,12).forEach((t,i)=>{

const remain=t.expirationTime-now

let cls="kitchen-running"

if(remain<=0)
cls="kitchen-expired"

else if(remain<=600000)
cls="kitchen-warning"

/* progress */

const total=(t.duration||1)*3600000

const percent=Math.max(0,Math.min(100,(remain/total)*100))

const card=document.createElement("div")

card.className="kitchen-card "+cls

card.innerHTML=`

<div class="kitchen-product">
${t.product}
</div>

<div class="kitchen-section">
${t.section}
</div>

<div class="kitchen-time">
${formatRemaining(remain)}
</div>

<div class="kitchen-progress">
<div class="kitchen-progress-bar" style="width:${percent}%"></div>
</div>

`

screen.appendChild(card)

})

}


function updateKitchenLive(){

const timers=getTimers()

renderKitchen(timers)

}


/* ===============================
INIT
=============================== */

/* ===============================
INIT
=============================== */

function init(){

applyLang()

const timers=getTimers()
const products=getProducts()

updateMetrics(products,timers)
renderHeatmap(timers)
renderCharts(timers)
buildTable(timers)
renderKitchen(timers)

/* منع تكرار التايمر */

if(dashboardTimer) clearInterval(dashboardTimer)

dashboardTimer=setInterval(()=>{

updateProgressBars()
updateKitchenLive()

},1000)

}

/* تحديث عند تغير البيانات */

document.addEventListener("timersUpdated",refreshDashboard)
document.addEventListener("dataSynced",refreshDashboard)

function refreshDashboard(){

const timers=getTimers()
const products=getProducts()

updateMetrics(products,timers)
renderHeatmap(timers)
renderCharts(timers)
buildTable(timers)
renderKitchen(timers)

}

/* تشغيل الصفحة عند تحميلها داخل index */

document.addEventListener("pageLoaded",init)

})();

</script>
