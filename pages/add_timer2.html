<style>

.addtimer-wrapper{
font-family:'Cairo','Segoe UI',sans-serif;
animation:fadeIn .4s ease
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px
}

.search-input{max-width:220px}

.toolbar-btn{
border:none;
padding:7px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
background:#0d6efd;
color:white
}

.toolbar-btn.secondary{
background:#6c757d
}

.sections-grid{
display:none;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px
}

.section-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white
}

.products-table{
background:#fff;
border-radius:12px;
overflow:hidden;
border:1px solid #e3e6ef
}

.products-table table{
width:100%;
border-collapse:collapse
}

.products-table th{
background:#eef4ff;
padding:12px;
text-align:center;
font-weight:700
}

.products-table td{
padding:8px;
border-top:1px solid #e3e6ef;
text-align:center
}

.qty-input{width:70px;text-align:center}

.add-btn{
background:#16a34a;
color:#fff;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer
}

.success-msg{text-align:center;color:#16a34a;font-weight:700;margin-top:10px}
.error-msg{text-align:center;color:#dc2626;font-weight:700;margin-top:10px}

</style>


<div class="addtimer-wrapper">

<h2>⏱ Add Timer</h2>

<div class="toolbar">

<input id="productSearch" class="form-control search-input" placeholder="Search">

<button id="btnAll" class="toolbar-btn">All</button>

<button id="btnSections" class="toolbar-btn secondary">Sections</button>

</div>

<div id="sectionsBar" class="sections-grid"></div>

<div class="products-table">

<table>

<thead>
<tr>
<th>Section</th>
<th>Product</th>
<th>Duration</th>
<th>Qty</th>
<th>Add</th>
</tr>
</thead>

<tbody id="productsBody">
<tr>
<td colspan="5">Loading...</td>
</tr>
</tbody>

</table>

</div>

<div id="successMsg" class="success-msg"></div>

</div>


<script>
(function(){

const SECRET="RESTAURANTS_ALARM_SYSTEM_DB1"

const SERVER="https://script.google.com/macros/s/AKfycbznthkSS3Ng6gZpps76qt9GS-Njdi3renpn4fhlmsdzGgHhI3bJql91_rCthCM0EZIf/exec"

const BRANCH = localStorage.getItem("branch") || "default"

const DEVICE = localStorage.getItem("deviceId") || crypto.randomUUID()

localStorage.setItem("deviceId",DEVICE)

let products=[]
let settings=[]
let currentSection="all"
let search=""

const sectionColors=[
"#ef4444","#f97316","#f59e0b","#10b981",
"#3b82f6","#6366f1","#8b5cf6","#ec4899"
]

/* ===============================
LOAD PRODUCTS
=============================== */

function loadProducts(){

/* 1️⃣ محاولة القراءة من DataStore */

if(window.DataStore && window.DataStore.products){

products = window.DataStore.products
settings = window.DataStore.sectionsSettings || []

}

/* 2️⃣ fallback localStorage */

if(!products.length){

products = JSON.parse(localStorage.getItem("products")||"[]")
settings = JSON.parse(localStorage.getItem("sectionsSettings")||"[]")

}

/* 3️⃣ إذا ما زالت فارغة */

if(!products.length){

document.getElementById("productsBody").innerHTML=
"<tr><td colspan='5'>⚠️ Products not loaded yet. Open Products page first.</td></tr>"

return

}

renderSections()
renderTable()

}

/* ===============================
SECTION SETTINGS
=============================== */

function getProductSection(p){
return p.Section || p.section || "Other"
}

/* ===============================
RENDER SECTIONS
=============================== */

function renderSections(){

const bar=document.getElementById("sectionsBar")

bar.innerHTML=""

const sections=[...new Set(products.map(p=>getProductSection(p)))]

sections.forEach((sec,i)=>{

const btn=document.createElement("button")

btn.textContent=sec
btn.className="section-btn"

btn.style.background=sectionColors[i % sectionColors.length]

btn.onclick=()=>{
currentSection=sec
renderSections()
renderTable()
}

bar.appendChild(btn)

})

}

/* ===============================
FILTER
=============================== */

function getFiltered(){

let list=[...products]

if(currentSection!=="all")
list=list.filter(p=>getProductSection(p)===currentSection)

if(search){

const q=search.toLowerCase()

list=list.filter(p=>
Object.values(p).join("").toLowerCase().includes(q)
)

}

return list

}

/* ===============================
TABLE
=============================== */

function renderTable(){

const body=document.getElementById("productsBody")

const list=getFiltered()

body.innerHTML=""

if(!list.length){

body.innerHTML="<tr><td colspan='5'>No Products</td></tr>"
return

}

list.forEach((p,i)=>{

const section=getProductSection(p)

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${section}</td>
<td>${p.Product_Name_EN || ""}</td>
<td>${p.Preparation_Duration || ""}</td>

<td>
<input type="number" class="qty-input" id="qty${i}" value="1">
</td>

<td>
<button class="add-btn" onclick="addTimer(${i},this)">➕</button>
</td>

`

body.appendChild(tr)

})

}

/* ===============================
ADD TIMER
=============================== */

window.addTimer=function(i,btn){

const list=getFiltered()

const prod=list[i]

const section=getProductSection(prod)

let qty=parseInt(document.getElementById("qty"+i).value)||1

let prepared=Date.now()

let duration=Number(prod.Preparation_Duration)||1

let expires=prepared+(duration*3600000)

let timers=JSON.parse(localStorage.getItem("timers")||"[]")

const timer={

id:Date.now(),

section:section,
product:prod.Product_Name_EN,

duration:duration,

quantity:qty,

preparedTime:prepared,
expirationTime:expires,

version:1,
device:DEVICE

}

timers.push(timer)

localStorage.setItem("timers",JSON.stringify(timers))

uploadTimer(timer)

btn.closest("tr").remove()

showSuccess("Timer Added")

}

/* ===============================
UPLOAD
=============================== */

async function uploadTimer(timer){

try{

await fetch(SERVER,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
secret:SECRET,
action:"addTimer",
branch:BRANCH,
timer:timer
})
})

}catch(err){

console.log("Upload error",err)

}

}

/* ===============================
MESSAGES
=============================== */

function showSuccess(msg){

const el=document.getElementById("successMsg")

el.innerText=msg

setTimeout(()=>el.innerText="",1500)

}

/* ===============================
EVENTS
=============================== */

document.getElementById("productSearch")
.addEventListener("input",e=>{
search=e.target.value
renderTable()
})

document.getElementById("btnAll").onclick=()=>{
currentSection="all"
renderSections()
renderTable()
}

document.getElementById("btnSections").onclick=()=>{
const bar=document.getElementById("sectionsBar")
bar.style.display=
bar.style.display==="flex"?"none":"flex"
}

/* ===============================
INIT
=============================== */

function init(){

loadProducts()

}

document.addEventListener("DOMContentLoaded",init)

})();
</script>
