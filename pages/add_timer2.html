<style>

.addtimer-wrapper{
font-family:'Cairo','Segoe UI',sans-serif;
animation:fadeIn .4s ease
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px
}

.search-input{max-width:220px}

.toolbar-btn{
border:none;
padding:7px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
background:#0d6efd;
color:white
}

.toolbar-btn.secondary{
background:#6c757d
}

.sections-grid{
display:none;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px
}

.section-btn{
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white
}

.products-table{
background:#fff;
border-radius:12px;
overflow:hidden;
border:1px solid #e3e6ef
}

.products-table table{
width:100%;
border-collapse:collapse
}

.products-table th{
background:#eef4ff;
padding:12px;
text-align:center;
font-weight:700
}

.products-table td{
padding:8px;
border-top:1px solid #e3e6ef;
text-align:center
}

.qty-input{width:70px;text-align:center}

.add-btn{
background:#16a34a;
color:#fff;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer
}

.success-msg{
text-align:center;
color:#16a34a;
font-weight:700;
margin-top:10px
}

</style>


<div class="addtimer-wrapper">

<h2>⏱ Add Timer</h2>

<div class="toolbar">

<input id="productSearch" class="form-control search-input" placeholder="Search">

<button id="btnAll" class="toolbar-btn">All</button>

<button id="btnSections" class="toolbar-btn secondary">Sections</button>

</div>

<div id="sectionsBar" class="sections-grid"></div>

<div class="products-table">

<table>

<thead>
<tr>
<th>Section</th>
<th>Product</th>
<th>Duration</th>
<th>Qty</th>
<th>Add</th>
</tr>
</thead>

<tbody id="productsBody">
<tr>
<td colspan="5">Loading products...</td>
</tr>
</tbody>

</table>

</div>

<div id="successMsg" class="success-msg"></div>

</div>


<script>
(function(){

const API_URL="https://script.google.com/macros/s/AKfycbyVSSPlJFT1ru3OWoOlqDzRr6lhBeiphl8GsMmN96kSPO_v5vtW28vQ-0O1LGLHDJTG/exec"

const SERVER="https://script.google.com/macros/s/AKfycbznthkSS3Ng6gZpps76qt9GS-Njdi3renpn4fhlmsdzGgHhI3bJql91_rCthCM0EZIf/exec"

const SECRET="RESTAURANTS_ALARM_SYSTEM_DB1"

const BRANCH=localStorage.getItem("branch")||"default"

const DEVICE=localStorage.getItem("deviceId")||crypto.randomUUID()

localStorage.setItem("deviceId",DEVICE)

let products=[]
let currentSection="all"
let search=""

const sectionColors=[
"#ff6b6b","#ffa94d","#ffd43b","#69db7c",
"#4dabf7","#9775fa","#f06595","#20c997"
]

/* ===============================
LOAD PRODUCTS
=============================== */

async function loadProducts(){

/* 1️⃣ DataStore */

if(window.DataStore && window.DataStore.products){

products=window.DataStore.products

}

/* 2️⃣ localStorage */

if(!products.length){

products=JSON.parse(localStorage.getItem("products")||"[]")

}

/* 3️⃣ API */

if(!products.length){

try{

const res=await fetch(API_URL+"?action=getProducts")

const data=await res.json()

if(Array.isArray(data)){

products=data.filter(p=>Object.values(p).some(v=>v))

localStorage.setItem("products",JSON.stringify(products))

}

}catch(e){

console.error("API load error",e)

}

}

/* إذا لم توجد منتجات */

if(!products.length){

document.getElementById("productsBody").innerHTML=
"<tr><td colspan='5'>⚠️ No products available</td></tr>"

return

}

renderSections()
renderTable()

}

/* ===============================
HELPERS
=============================== */

function getProductSection(p){

return p.Section||"Other"

}

/* ===============================
RENDER SECTIONS
=============================== */

function renderSections(){

const bar=document.getElementById("sectionsBar")

bar.innerHTML=""

const sections=[...new Set(products.map(p=>getProductSection(p)))]

sections.forEach((sec,i)=>{

const btn=document.createElement("button")

btn.className="section-btn"

btn.innerText=sec

btn.style.background=sectionColors[i%sectionColors.length]

btn.onclick=()=>{

currentSection=sec

renderSections()

renderTable()

}

bar.appendChild(btn)

})

}

/* ===============================
FILTER
=============================== */

function getFiltered(){

let list=[...products]

if(currentSection!=="all")
list=list.filter(p=>getProductSection(p)===currentSection)

if(search){

const q=search.toLowerCase()

list=list.filter(p=>
Object.values(p).join("").toLowerCase().includes(q)
)

}

return list

}

/* ===============================
TABLE
=============================== */

function renderTable(){

const body=document.getElementById("productsBody")

const list=getFiltered()

body.innerHTML=""

if(!list.length){

body.innerHTML="<tr><td colspan='5'>No Products</td></tr>"

return

}

list.forEach((p,i)=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${getProductSection(p)}</td>
<td>${p.Product_Name_EN||""}</td>
<td>${p.Preparation_Duration||""}</td>

<td>
<input type="number" class="qty-input" id="qty${i}" value="1">
</td>

<td>
<button class="add-btn" onclick="addTimer(${i},this)">➕</button>
</td>

`

body.appendChild(tr)

})

}

/* ===============================
ADD TIMER
=============================== */

window.addTimer=function(i,btn){

const list=getFiltered()

const prod=list[i]

const section=getProductSection(prod)

let qty=parseInt(document.getElementById("qty"+i).value)||1

let prepared=Date.now()

let duration=Number(prod.Preparation_Duration)||1

let expires=prepared+(duration*3600000)

let timers=JSON.parse(localStorage.getItem("timers")||"[]")

const timer={

id:Date.now(),

section:section,
product:prod.Product_Name_EN,

duration:duration,
quantity:qty,

preparedTime:prepared,
expirationTime:expires,

version:1,
device:DEVICE

}

timers.push(timer)

localStorage.setItem("timers",JSON.stringify(timers))

uploadTimer(timer)

btn.closest("tr").remove()

showSuccess("Timer Added")

}

/* ===============================
UPLOAD TIMER
=============================== */

async function uploadTimer(timer){

try{

await fetch(SERVER,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
secret:SECRET,
action:"addTimer",
branch:BRANCH,
timer:timer
})
})

}catch(err){

console.log("Upload error",err)

}

}

/* ===============================
MESSAGES
=============================== */

function showSuccess(msg){

const el=document.getElementById("successMsg")

el.innerText=msg

setTimeout(()=>el.innerText="",1500)

}

/* ===============================
EVENTS
=============================== */

document.getElementById("productSearch")
.addEventListener("input",e=>{

search=e.target.value

renderTable()

})

document.getElementById("btnAll").onclick=()=>{

currentSection="all"

renderSections()

renderTable()

}

document.getElementById("btnSections").onclick=()=>{

const bar=document.getElementById("sectionsBar")

bar.style.display=
bar.style.display==="flex"
?"none":"flex"

}

/* ===============================
INIT
=============================== */

document.addEventListener("DOMContentLoaded",loadProducts)

})();
</script>
